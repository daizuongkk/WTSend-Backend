<!-- templates/emails/forgot-password.html -->

<!DOCTYPE html>
<html lang="vi">

<head>
	<meta charset="UTF-8">
	<title>Quên mật khẩu</title>
</head>

<body style="
    margin:0;
    padding:40px 20px;
    background:#f4f7fb;
    font-family:Arial,sans-serif;
">

	<div style="
    max-width:520px;
    margin:auto;
    background:#ffffff;
    border-radius:16px;
    overflow:hidden;
    border:1px solid #e5e7eb;
">

		<!-- Header -->
		<div style="
        background:linear-gradient(135deg,#dc2626,#b91c1c);
        padding:32px 24px;
        text-align:center;
    ">
			<h1 style="
            margin:0;
            color:white;
            font-size:28px;
        ">
				WTSend
			</h1>
		</div>

		<!-- Body -->
		<div style="padding:36px 32px;">

			<h2 style="
            margin-top:0;
            color:#111827;
        ">
				Đặt lại mật khẩu
			</h2>

			<p style="
            color:#4b5563;
            line-height:1.7;
        ">
				Chúng tôi đã nhận được yêu cầu đặt lại mật khẩu
				cho tài khoản của bạn.
			</p>

			<div style="
            text-align:center;
            margin:36px 0;
        ">
				<a th:href="${resetPasswordLink}" style="
                    display:inline-block;
                    padding:14px 28px;
                    background:#dc2626;
                    color:white;
                    text-decoration:none;
                    border-radius:10px;
                    font-weight:600;
                ">
					Đặt lại mật khẩu
				</a>
			</div>

			<p style="
            color:#6b7280;
            font-size:14px;
            line-height:1.7;
        ">
				Liên kết này sẽ hết hạn sau
				<strong>15 phút</strong>.
			</p>

			<p style="
            color:#6b7280;
            font-size:14px;
            line-height:1.7;
        ">
				Nếu bạn không yêu cầu đặt lại mật khẩu,
				hãy bỏ qua email này.
			</p>

		</div>

		<!-- Footer -->
		<div style="
        padding:20px;
        text-align:center;
        background:#f9fafb;
        border-top:1px solid #e5e7eb;
    ">
			<p style="
            margin:0;
            color:#9ca3af;
            font-size:12px;
        ">
				© 2026 WTSend
			</p>
		</div>

	</div>

</body>

</html>
